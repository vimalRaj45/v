<!DOCTYPE html>
<html>
<head>
<title>Appointment Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {font-family: Arial; background:#f4f6f9; padding:20px;}
.container {max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px;}
input,select,textarea,button{width:100%;margin-top:10px;padding:10px;}
button{background:#007bff;color:white;border:none;}
.hidden{display:none;}
.status{margin-top:10px;padding:10px;}
.success{background:#d4edda;}
.error{background:#f8d7da;}
</style>
</head>

<body>

<div class="container">
<h2>Book Appointment</h2>

<input id="phone" placeholder="Phone">
<button onclick="checkUser()">Next</button>

<div id="formSection" class="hidden">
<input id="name" placeholder="Name">
<input type="date" id="date">
<input type="time" id="time">

<select id="service">
<option value="">Select Service</option>
<option>Consultation</option>
<option>Dental</option>
<option>Checkup</option>
</select>

<textarea id="message"></textarea>

<button onclick="book()">Book</button>
</div>

<div id="statusBox" class="status hidden"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyhVBbkkoEwxvekP1twgtKfhNrZokmCqWsRKirW0TiCUpG66I1CmpPXpFss41QcEgMa/exec";

function show(msg,type="success"){
  const b=document.getElementById("statusBox");
  b.innerText=msg;
  b.className="status "+type;
  b.classList.remove("hidden");
}

async function checkUser(){
  const phone=document.getElementById("phone").value;

  const res=await fetch(URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"check_user",phone})
  });

  const data=await res.json();

  document.getElementById("formSection").classList.remove("hidden");

  if(data.data){
    document.getElementById("name").value=data.data.name;
  }else{
    show("New user, enter name");
  }
}

async function book(){
  const body={
    action:"book_appointment",
    name:name.value,
    phone:phone.value,
    date:date.value,
    time:time.value,
    service:service.value,
    message:message.value
  };

  const res=await fetch(URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });

  const data=await res.json();

  if(data.status==="success"){
    show("✅ Appointment Pending");
  }else{
    show(data.message,"error");
  }
}
</script>

</body>
</html>
